<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./assets/logos/favicon.ico.png" />
  <title>U.O.G.A. Hard Data</title>
  <script src="./embed-mode.js?v=20260422-embed-1"></script>
  <link rel="stylesheet" href="./style.css?v=20260506-hard-data-ops-1" />
  <style>
    body {
      background:
        radial-gradient(1100px 420px at 50% -120px, rgba(255, 198, 132, 0.16), transparent 72%),
        linear-gradient(180deg, #24170f 0%, #17100b 100%);
    }
    .shell { max-width: 1320px; }
    .ops-panel {
      border: 1px solid rgba(153, 112, 75, 0.48);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(61, 39, 24, 0.93) 0%, rgba(47, 30, 19, 0.96) 100%),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 26px
        );
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }
    .ops-head {
      padding: 16px;
      border-bottom: 1px solid rgba(184, 140, 98, 0.38);
      background: linear-gradient(180deg, rgba(248, 222, 190, 0.12) 0%, rgba(0, 0, 0, 0) 100%);
    }
    .ops-head h2 {
      margin: 0 0 8px;
      color: #f6e1c4;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: 22px;
    }
    .ops-head .helper {
      margin: 0;
      color: #e1c19b;
      font-size: 13px;
    }
    .ops-body {
      padding: 14px 16px 20px;
      display: grid;
      gap: 14px;
    }
    .ops-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .ops-stat {
      border: 1px solid rgba(178, 136, 94, 0.35);
      border-radius: 12px;
      padding: 10px;
      background: rgba(37, 23, 15, 0.86);
    }
    .ops-stat .k {
      display: block;
      color: #f5dfc4;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.05;
    }
    .ops-stat .l {
      display: block;
      margin-top: 4px;
      color: #d8b790;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .ops-controls {
      border: 1px solid rgba(176, 132, 90, 0.3);
      border-radius: 12px;
      background: rgba(31, 19, 12, 0.66);
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .ops-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .ops-search,
    .ops-filter {
      border: 1px solid rgba(186, 144, 102, 0.35);
      border-radius: 10px;
      background: rgba(45, 28, 18, 0.95);
      color: #f5dfc4;
      font: inherit;
    }
    .ops-search {
      width: 100%;
      padding: 10px 12px;
    }
    .ops-filter {
      padding: 9px 10px;
      min-width: 170px;
    }
    .ops-filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 8px;
    }
    .ops-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ops-chip {
      border: 1px solid rgba(184, 141, 98, 0.42);
      border-radius: 999px;
      background: rgba(52, 33, 22, 0.88);
      color: #f1d5b0;
      font-weight: 700;
      letter-spacing: .02em;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .ops-chip.active {
      background: #d39b5e;
      color: #2d1d12;
      border-color: #d39b5e;
    }
    .ops-count {
      color: #dfbf98;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 700;
      white-space: nowrap;
    }
    .ops-sections {
      display: grid;
      gap: 14px;
    }
    .ops-section {
      border: 1px solid rgba(169, 126, 86, 0.3);
      border-radius: 12px;
      background: rgba(28, 17, 11, 0.62);
      padding: 10px;
    }
    .ops-section h3 {
      margin: 0 0 8px;
      color: #efd4b1;
      text-transform: uppercase;
      letter-spacing: .03em;
      font-size: 14px;
    }
    .ops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }
    .ops-card {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 10px;
      text-decoration: none;
      border: 1px solid rgba(170, 128, 88, 0.35);
      border-radius: 12px;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(70, 45, 28, 0.94) 0%, rgba(57, 36, 23, 0.94) 100%),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 22px
        );
      color: #f5dfc4;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.24);
    }
    .ops-card:hover {
      border-color: rgba(231, 183, 128, 0.58);
      transform: translateY(-1px);
    }
    .ops-ico {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: inline-grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      background: rgba(236, 191, 138, 0.18);
      color: #ffd7a7;
      border: 1px solid rgba(236, 191, 138, 0.35);
      text-transform: uppercase;
    }
    .ops-title {
      display: block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 4px;
      color: #f9e6cd;
      line-height: 1.25;
    }
    .ops-sub {
      display: block;
      font-size: 12px;
      color: #d9bc99;
      line-height: 1.35;
    }
    .ops-meta {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #c9a57f;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .ops-empty {
      border: 1px dashed rgba(181, 139, 97, 0.38);
      border-radius: 10px;
      padding: 12px;
      color: #e3c8a6;
      background: rgba(52, 32, 20, 0.85);
      font-size: 13px;
    }
    @media (max-width: 980px) {
      .ops-toolbar { grid-template-columns: 1fr; }
      .ops-filters { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .ops-filters { grid-template-columns: 1fr; }
    }
  </style>
  <script src="https://js.sentry-cdn.com/26137c5576f01423efc85f47076f9548.min.js" crossorigin="anonymous"></script>
  <script src="./sentry-browser-init.js"></script>
</head>
<body>
  <section class="page-nav-strip" aria-label="Site navigation">
    <div class="page-nav-case">
      <nav class="utility-nav">
        <a class="utility-link" href="./index.html#google-maps"><span>HUNT BUILDER</span></a>
        <a class="utility-link" href="./research.html"><span>HUNT RESEARCH</span></a>
        <a class="utility-link" href="./verify.html"><span>OUTFITTERS</span></a>
        <a class="utility-link" href="./hard-copy.html"><span>HARD COPIES</span></a>
        <a class="utility-link active" href="./hard-data.html" aria-current="page"><span>HARD DATA</span></a>
      </nav>
    </div>
  </section>

  <header class="topbar">
    <div class="controls"><div class="controls-center"></div></div>
  </header>

  <main class="shell" style="padding: 16px 0 40px;">
    <section class="ops-panel">
      <div class="ops-head">
        <h2>Hard Data Operations</h2>
        <p class="helper">Production data tables, model inputs, export bundles, and processing logs in one place.</p>
      </div>

      <div class="ops-body">
        <div class="ops-stats" id="opsStats" aria-live="polite"></div>

        <div class="ops-controls">
          <div class="ops-toolbar">
            <input id="opsSearch" class="ops-search" type="search" placeholder="Search by title, type, year, group, or notes..." aria-label="Search hard data files">
            <span id="opsCount" class="ops-count">Loading...</span>
          </div>
          <div class="ops-filters">
            <select id="opsType" class="ops-filter" aria-label="Filter by type"><option value="all">All types</option></select>
            <select id="opsYear" class="ops-filter" aria-label="Filter by year"><option value="all">All years</option></select>
            <select id="opsSource" class="ops-filter" aria-label="Filter by source"><option value="all">All sources</option></select>
            <select id="opsScope" class="ops-filter" aria-label="Filter by scope"><option value="all">All scopes</option></select>
          </div>
          <div id="opsChips" class="ops-chips" role="tablist" aria-label="Data groups"></div>
        </div>

        <div id="opsSections" class="ops-sections"></div>
      </div>
    </section>
  </main>

  <script src="./ui.js?v=20260506-backpack-sticky-1"></script>
  <script src="./header-layout.js?v=20260506-layout-rail-1"></script>
  <script>
    const RUNTIME_MANIFEST = './processed_data/hard_data_exports/hard_data_manifest.web.json';

    const STATIC_CATALOG = [
      {
        group: 'pipeline_logs',
        type: 'csv',
        title: 'Staging Ingest Execution Log (2026-05-06)',
        subtitle: 'All staging moves executed in the most recent cleanup pass.',
        href: './pipeline/manifests/staging_ingest_execution_20260506.csv',
        source: 'pipeline',
        scope: 'operations'
      },
      {
        group: 'pipeline_logs',
        type: 'csv',
        title: 'Year Retarget Execution Log (2026-05-06)',
        subtitle: 'High-confidence model-year retarget file moves.',
        href: './pipeline/manifests/pdf_high_conf_year_retarg_execution_20260506.csv',
        source: 'pipeline',
        scope: 'operations'
      },
      {
        group: 'pipeline_logs',
        type: 'csv',
        title: 'PDF Misplacement Final Audit (2026-05-06)',
        subtitle: 'Current mismatch report after safe auto-fixes.',
        href: './pipeline/manifests/pdf_misplacement_audit_20260506_final.csv',
        source: 'pipeline',
        scope: 'audit'
      },
      {
        group: 'database',
        type: 'sqlite',
        title: 'Truth Database From JSON',
        subtitle: 'Built from canonical hunt JSON + mapped boundary references.',
        href: './processed_data/hunt_truth_from_json.sqlite',
        source: 'processed_data',
        scope: 'database'
      },
      {
        group: 'database',
        type: 'sqlite',
        title: 'Truth Downloads Comprehensive',
        subtitle: 'External download-based SQLite for cross-check and comparison.',
        href: './processed_data/truth_downloads_comprehensive.sqlite',
        source: 'processed_data',
        scope: 'database'
      },
      {
        group: 'database',
        type: 'md',
        title: 'Truth Crosscheck Report',
        subtitle: 'Cross-validation notes between canonical, boundary, and download truth paths.',
        href: './processed_data/truth_crosscheck_report.md',
        source: 'processed_data',
        scope: 'audit'
      },
      {
        group: 'database',
        type: 'json',
        title: 'Truth Crosscheck Report (JSON)',
        subtitle: 'Machine-readable crosscheck summary metrics.',
        href: './processed_data/truth_crosscheck_report.json',
        source: 'processed_data',
        scope: 'audit'
      }
    ];

    const GROUP_LABELS = {
      all: 'All',
      tools: 'Tools',
      canonical: 'Canonical',
      exports: 'Exports',
      raw_library: 'Raw Library',
      pipeline_logs: 'Pipeline Logs',
      database: 'Databases'
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function inferYear(item) {
      const hay = [item.title, item.subtitle, item.href].join(' ');
      const m = String(hay).match(/\b(20\d{2})\b/);
      return m ? m[1] : '';
    }

    function normalizeManifestItems(items) {
      return items.map(item => {
        const type = String(item.type || '').trim().toLowerCase() || 'file';
        return {
          ...item,
          group: String(item.group || 'exports').trim().toLowerCase(),
          type,
          year: item.year || inferYear(item),
          source: String(item.source || (item.href || '').startsWith('./pipeline/') ? 'pipeline' : 'processed_data').trim().toLowerCase(),
          scope: String(item.scope || 'runtime').trim().toLowerCase()
        };
      });
    }

    function iconLabel(type) {
      const t = String(type || 'file').toLowerCase();
      if (t.length <= 4) return t;
      return t.slice(0, 4);
    }

    function groupLabel(key) {
      return GROUP_LABELS[key] || key;
    }

    function buildStats(items) {
      const total = items.length;
      const runtime = items.filter(x => x.scope === 'runtime').length;
      const audit = items.filter(x => x.scope === 'audit').length;
      const db = items.filter(x => x.group === 'database').length;
      return [
        { k: total, l: 'Total Linked Files' },
        { k: runtime, l: 'Runtime Data Assets' },
        { k: audit, l: 'Audit + Log Artifacts' },
        { k: db, l: 'Database Snapshots' }
      ];
    }

    function drawStats(items) {
      const host = document.getElementById('opsStats');
      const stats = buildStats(items);
      host.innerHTML = stats.map(s => `
        <article class="ops-stat">
          <span class="k">${escapeHtml(s.k)}</span>
          <span class="l">${escapeHtml(s.l)}</span>
        </article>
      `).join('');
    }

    function renderCatalog(items) {
      const searchEl = document.getElementById('opsSearch');
      const typeEl = document.getElementById('opsType');
      const yearEl = document.getElementById('opsYear');
      const sourceEl = document.getElementById('opsSource');
      const scopeEl = document.getElementById('opsScope');
      const chipsEl = document.getElementById('opsChips');
      const countEl = document.getElementById('opsCount');
      const sectionsEl = document.getElementById('opsSections');

      const rows = normalizeManifestItems(items);
      drawStats(rows);

      const groups = ['all', ...Array.from(new Set(rows.map(r => r.group)))];
      const types = ['all', ...Array.from(new Set(rows.map(r => r.type))).sort()];
      const years = ['all', ...Array.from(new Set(rows.map(r => r.year).filter(Boolean))).sort((a,b)=>Number(b)-Number(a))];
      const sources = ['all', ...Array.from(new Set(rows.map(r => r.source))).sort()];
      const scopes = ['all', ...Array.from(new Set(rows.map(r => r.scope))).sort()];

      typeEl.innerHTML = types.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v === 'all' ? 'All types' : v.toUpperCase())}</option>`).join('');
      yearEl.innerHTML = years.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v === 'all' ? 'All years' : v)}</option>`).join('');
      sourceEl.innerHTML = sources.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v === 'all' ? 'All sources' : v)}</option>`).join('');
      scopeEl.innerHTML = scopes.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v === 'all' ? 'All scopes' : v)}</option>`).join('');

      let activeGroup = 'all';

      function drawChips() {
        chipsEl.innerHTML = groups.map(group => {
          const active = group === activeGroup ? 'active' : '';
          return `<button class="ops-chip ${active}" type="button" data-group="${escapeHtml(group)}">${escapeHtml(groupLabel(group))}</button>`;
        }).join('');

        chipsEl.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            activeGroup = btn.dataset.group || 'all';
            drawChips();
            drawSections();
          });
        });
      }

      function filterRows() {
        const q = String(searchEl.value || '').trim().toLowerCase();
        const fType = typeEl.value || 'all';
        const fYear = yearEl.value || 'all';
        const fSource = sourceEl.value || 'all';
        const fScope = scopeEl.value || 'all';

        return rows.filter(row => {
          if (activeGroup !== 'all' && row.group !== activeGroup) return false;
          if (fType !== 'all' && row.type !== fType) return false;
          if (fYear !== 'all' && row.year !== fYear) return false;
          if (fSource !== 'all' && row.source !== fSource) return false;
          if (fScope !== 'all' && row.scope !== fScope) return false;
          if (!q) return true;

          const hay = [row.title, row.subtitle, row.href, row.group, row.type, row.year, row.source, row.scope]
            .join(' ')
            .toLowerCase();
          return hay.includes(q);
        });
      }

      function drawSections() {
        const filtered = filterRows();
        countEl.textContent = `${filtered.length} of ${rows.length} files`;

        if (!filtered.length) {
          sectionsEl.innerHTML = '<div class="ops-empty">No files match this filter.</div>';
          return;
        }

        const byGroup = new Map();
        filtered.forEach(item => {
          if (!byGroup.has(item.group)) byGroup.set(item.group, []);
          byGroup.get(item.group).push(item);
        });

        sectionsEl.innerHTML = Array.from(byGroup.entries()).map(([group, list]) => {
          list.sort((a,b) => {
            const ya = Number(a.year || 0);
            const yb = Number(b.year || 0);
            if (ya !== yb) return yb - ya;
            return String(a.title || '').localeCompare(String(b.title || ''));
          });

          const cards = list.map(item => `
            <a class="ops-card" role="listitem" href="${escapeHtml(item.href)}" target="_blank" rel="noopener noreferrer">
              <span class="ops-ico" aria-hidden="true">${escapeHtml(iconLabel(item.type))}</span>
              <span>
                <span class="ops-title">${escapeHtml(item.title || 'Untitled')}</span>
                <span class="ops-sub">${escapeHtml(item.subtitle || 'No description')}</span>
                <span class="ops-meta">${escapeHtml((item.type || '').toUpperCase())}${item.year ? ` | ${escapeHtml(item.year)}` : ''}${item.source ? ` | ${escapeHtml(item.source)}` : ''}</span>
              </span>
            </a>
          `).join('');

          return `
            <section class="ops-section">
              <h3>${escapeHtml(groupLabel(group))}</h3>
              <div class="ops-grid" role="list">${cards}</div>
            </section>
          `;
        }).join('');
      }

      [searchEl, typeEl, yearEl, sourceEl, scopeEl].forEach(el => {
        const evt = el === searchEl ? 'input' : 'change';
        el.addEventListener(evt, drawSections);
      });

      drawChips();
      drawSections();
    }

    async function loadManifest() {
      const response = await fetch(RUNTIME_MANIFEST, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Manifest load failed (${response.status})`);
      const data = await response.json();
      if (!Array.isArray(data)) throw new Error('Manifest shape invalid');
      return data;
    }

    loadManifest()
      .then(runtimeItems => renderCatalog([...runtimeItems, ...STATIC_CATALOG]))
      .catch(err => {
        const host = document.getElementById('opsSections');
        host.innerHTML = `<div class="ops-empty">Could not load hard-data manifest: ${escapeHtml(err.message)}</div>`;
      });
  </script>
</body>
</html>
