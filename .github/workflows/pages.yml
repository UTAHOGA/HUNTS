name: Deploy Pages (with Google Maps key injection)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Maps API key into config.js
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY}" ]; then
            echo "Missing secret GOOGLE_MAPS_API_KEY" >&2
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import os, re, sys

          p = Path('config.js')
          if not p.exists():
            sys.stderr.write('config.js not found\n')
            sys.exit(1)

          key = os.environ['GOOGLE_MAPS_API_KEY'].strip()
          if not key:
            sys.stderr.write('GOOGLE_MAPS_API_KEY is empty\n')
            sys.exit(1)

          src = p.read_text(encoding='utf-8')
          pat = r"const\s+GOOGLE_MAPS_API_KEY\s*=\s*'[^']*';"
          repl = f"const GOOGLE_MAPS_API_KEY = '{key}';"
          out, n = re.subn(pat, repl, src, count=1)
          if n != 1:
            sys.stderr.write('Failed to replace GOOGLE_MAPS_API_KEY constant\n')
            sys.exit(1)

          p.write_text(out, encoding='utf-8')
          print('Injected key into config.js')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
