<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U.O.G.A. Hunt Planner | VETTED OUTFITTERS</title>
  <style>
    /* --- THEME VARIABLES --- */
    :root {
      --bg: #f4efe4;
      --panel: rgba(255, 251, 244, 0.97);
      --panel2: #fffdf8;
      --line: #c9a27f;
      --text: #2b1c12;
      --muted: #6b5646;
      --accent: #bf6b34;
      --accent-dark: #9e5323;
      --shadow: 0 10px 28px rgba(58, 37, 18, 0.16);
      --font-display: Georgia, serif;
      --font-ui: "Segoe UI", Arial, sans-serif;
    }

    body.theme-dark {
      --bg: #141414;
      --panel: rgba(35, 30, 26, 0.88);
      --panel2: #2b231d;
      --line: #5c412d;
      --text: #f4efe4;
      --muted: #a89483;
      --accent: #d07b44;
      --accent-dark: #bf6b34;
      --bg-image: url('https://static.wixstatic.com/media/43f827_284b2a8baca14085b47565f566c97a75~mv2.jpg/v1/fill/w_1519,h_220,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/43f827_284b2a8baca14085b47565f566c97a75~mv2.jpg');
    }

    /* --- RESET & LAYOUT ENGINE --- */
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { 
      display: flex; 
      flex-direction: column; 
      color: var(--text); 
      font-family: var(--font-ui);
      background-color: var(--bg);
      background-image: var(--bg-image);
      background-size: cover;
      background-attachment: fixed;
    }

    /* --- CINEMATIC LOADER --- */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: #000000; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    .loading-overlay.hidden { display: none !important; }
    .elk-video-container { text-align: center; width: 90%; max-width: 600px; }
    #loaderVideo { width: 100%; height: auto; border-radius: 8px; }
    .loading-status { color: #ffffff; margin-top: 20px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 2px; }

    /* --- TOPBAR --- */
    .topbar { 
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 18px; 
      padding: 12px 20px; background: var(--panel); 
      border-bottom: 1px solid var(--line); box-shadow: var(--shadow);
      backdrop-filter: blur(10px); z-index: 10;
    }
    .brand-logo-lockup { display: flex; align-items: center; gap: 16px; }
    .brand-logo-lockup img { height: 60px; width: auto; background: #fff; padding: 2px; border-radius: 4px; }
    .brand h1 { margin: 0; font-family: var(--font-display); font-size: 22px; line-height: 1; }
    .brand p { margin: 4px 0 0; color: var(--accent); font-family: var(--font-display); font-size: 20px; font-weight: 700; line-height: 1; }

    /* --- APP GRID --- */
    .layout { 
      flex: 1; 
      display: grid; 
      grid-template-columns: 340px 1fr 320px; 
      min-height: 0; /* Critical for inner scrolling */
    }
    .sidebar, .rightbar { background: var(--panel); overflow-y: auto; padding: 15px; }
    .sidebar { border-right: 1px solid var(--line); }
    .rightbar { border-left: 1px solid var(--line); }
    
    .map-wrap { position: relative; height: 100%; background: #eee; }
    #map, #globeMap { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* --- COMPONENTS --- */
    .panel { border: 1px solid var(--line); border-radius: 12px; background: var(--panel2); box-shadow: var(--shadow); margin-bottom: 15px; overflow: hidden; }
    .panel h2 { margin: 0; padding: 10px 15px; font-family: var(--font-display); font-size: 18px; background: linear-gradient(180deg, var(--accent), var(--accent-dark)); color: #fff; }
    .panel-body { padding: 15px; }
    
    .field { margin-bottom: 12px; display: grid; gap: 5px; }
    .field label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--muted); }
    select, input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: var(--panel); color: var(--text); }
    
    .controls { display: flex; gap: 8px; align-items: center; }
    button { padding: 8px 15px; border-radius: 20px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    button.secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }

    .hunt-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; background: var(--panel2); }
    .hunt-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .hunt-card-title { font-weight: bold; font-size: 14px; }
    .hunt-card-meta { font-size: 12px; color: var(--muted); }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; overflow-y: auto; }
      .map-wrap { height: 500px; order: -1; }
    }
  </style>
</head>
<body class="theme-dark">

  <div id="loadingOverlay" class="loading-overlay">
    <div class="elk-video-container">
      <video id="loaderVideo" autoplay muted playsinline>
        <source src="RUNNING_ELK.MP4" type="video/mp4">
      </video>
      <div class="loading-status" id="loadingText">Gathering Utah Hunt Data...</div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo-lockup">
        <a href="https://www.uoga.org" target="_blank">
          <img src="https://static.wixstatic.com/media/43f827_24f00cd070494533955d4910eef3a2fb~mv2.jpg/v1/fill/w_207,h_105,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/Group%20945%20(1).jpg" alt="Logo">
        </a>
        <div>
          <h1>U.O.G.A. Hunt Planner</h1>
          <p>Vetted Outfitters</p>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="themeToggleBtn" type="button" class="secondary">Light Mode</button>
      <select id="mapTypeSelect" style="width: auto;">
        <option value="terrain">Terrain</option>
        <option value="hybrid">Hybrid</option>
        <option value="globe">Globe</option>
      </select>
      <button id="resetViewBtn" type="button" class="secondary">Reset Utah</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Find a Hunt</h2>
        <div class="panel-body">
          <div class="field">
            <label>Search</label>
            <input id="searchInput" type="text" placeholder="Hunt # or Unit...">
          </div>
          <div class="field">
            <label>Species</label>
            <select id="speciesFilter"><option value="All Species">Loading...</option></select>
          </div>
          <div class="field">
            <label>Sex</label>
            <select id="sexFilter"><option value="All">All</option></select>
          </div>
          <div class="field">
            <label>Weapon</label>
            <select id="weaponFilter"><option value="All">All</option></select>
          </div>
          <div class="field">
            <label>Unit</label>
            <select id="unitFilter"><option value="">All Units</option></select>
          </div>
          <div id="status" style="font-size: 11px; margin-top: 10px; opacity: 0.7;">Ready</div>
        </div>
      </section>

      <section class="panel">
        <h2>Matching Hunts</h2>
        <div id="matchingHunts" class="panel-body"></div>
      </section>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div id="globeMap"></div>
    </section>

    <aside class="rightbar">
      <section class="panel">
        <h2>Selected Hunt</h2>
        <div id="selectedHuntPanel" class="panel-body"></div>
      </section>
      <section class="panel">
        <h2>Outfitters</h2>
        <div id="outfitterResults" class="panel-body"></div>
      </section>
    </aside>
  </main>

  <script>
    // Simple Theme Toggle
    document.getElementById('themeToggleBtn').addEventListener('click', function() {
      document.body.classList.toggle('theme-dark');
      this.textContent = document.body.classList.contains('theme-dark') ? 'Light Mode' : 'Dark Mode';
    });
  </script>

  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.135/Build/Cesium/Widgets/widgets.css">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.135/Build/Cesium/Cesium.js"></script>
  <script src="app.js?v=20260324"></script>
</body>
</html>
